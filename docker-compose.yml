services:
    sio_test:
        user: app
        build:
            context: 'docker/php'
            args:
                USER_ID: ${USER_ID:-1000}
        container_name: 'sio_app'
        ports:
            - "8337:8337"
        volumes:
            - .:/app:rw
        environment:
            - APP_ENV=dev
        depends_on:
            pgsql:
                condition: service_healthy

    pgsql:
        build: 'docker/postgresql'
        container_name: 'sio_pgsql'
        environment:
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: admin
            POSTGRES_DB: sio
        ports:
            - '5433:5432'
        volumes:
            - 'postgresql-data:/var/lib/postgresql'
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U admin" ]
            interval: 3s
            timeout: 3s
            retries: 20

volumes:
    postgresql-data:
        driver: 'local'
