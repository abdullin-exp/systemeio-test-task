services:
    sio_test:
        user: app
        build:
            context: 'docker/php'
            args:
                USER_ID: ${USER_ID:-1000}
        container_name: 'sio_app'
        ports:
            - "8337:8337"
        volumes:
            - .:/app:rw
        environment:
            - APP_ENV=dev

    pgsql:
        build: 'docker/postgresql'
        container_name: 'sio_pgsql'
        environment:
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: admin
            POSTGRES_DB: sio
        ports:
            - '5433:5432'
        volumes:
            - 'postgresql-data:/var/lib/postgresql/data'

volumes:
    postgresql-data:
        driver: 'local'


